<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Pro | Django</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .card { border: none; transition: transform 0.2s; border-radius: 12px; }
        .card:hover { transform: translateY(-5px); }
        .btn-rounded { border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'listar_libros' %}">
                <i class="fas fa-book-open me-2"></i>BIBLIOTECA PRO
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <!-- Opciones para Usuarios Logueados -->
                        <li class="nav-item">
                            <span class="nav-link text-light me-3">
                                <i class="fas fa-user-circle me-1"></i> Hola, <strong>{{ user.username }}</strong>
                            </span>
                        </li>
                        <li class="nav-item">
                            <a href="{% url 'crear_libro' %}" class="btn btn-success btn-sm btn-rounded me-2">
                                <i class="fas fa-plus"></i> Nuevo Libro
                            </a>
                        </li>
                        <li class="nav-item">
                            <form action="{% url 'admin:logout' %}" method="post" class="d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm btn-rounded">
                                    <i class="fas fa-sign-out-alt"></i> Salir
                                </button>
                            </form>
                        </li>
                    {% else %}
                        <!-- Opciones para Visitantes -->
                        <li class="nav-item">
                            <a href="/admin/login/" class="btn btn-outline-info btn-sm btn-rounded">
                                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión (Admin)
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Notificaciones de Django -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-info-circle me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
